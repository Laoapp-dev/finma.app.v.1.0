const SUPPORTED_LANGUAGES = [{ code: "en", label: "English" }, { code: "lo", label: "ພາສາລາວ" }];

function translate(lang, key, vars) {
  vars = vars || {};
  const dig = (dict) => key.split(".").reduce((acc, p) => (acc && acc[p] !== undefined ? acc[p] : undefined), dict);
  let str = dig(LOCALES[lang]) ?? dig(LOCALES.en) ?? key;
  Object.entries(vars).forEach(([k, v]) => { str = str.replace(new RegExp(`{{${k}}}`, "g"), v); });
  return str;
}

const LanguageContext = createContext(null);
function LanguageProvider({ children }) {
  const [language, setLanguage] = useState("en");
  const t = useCallback((key, vars) => translate(language, key, vars), [language]);
  return (
    <LanguageContext.Provider value={{ language, setLanguage, t, supportedLanguages: SUPPORTED_LANGUAGES }}>
      {children}
    </LanguageContext.Provider>
  );
}
const useLanguage = () => useContext(LanguageContext);

/* ============================= Currency ============================= */
const CURRENCIES = {
  LAK: { code: "LAK", symbol: "₭", decimals: 0, locale: "lo-LA" },
  THB: { code: "THB", symbol: "฿", decimals: 2, locale: "th-TH" },
  USD: { code: "USD", symbol: "$", decimals: 2, locale: "en-US" },
};
const RATES_TO_USD = { LAK: 1 / 21000, THB: 1 / 36, USD: 1 };
function convertCurrency(amount, from, to) {
  if (from === to) return amount;
  return (amount * RATES_TO_USD[from]) / RATES_TO_USD[to];
}
function formatCurrency(amount, code) {
  const meta = CURRENCIES[code] || CURRENCIES.USD;
  const formatted = Number(amount || 0).toLocaleString(meta.locale, { minimumFractionDigits: meta.decimals, maximumFractionDigits: meta.decimals });
  return `${meta.symbol}${formatted}`;
}

const CurrencyContext = createContext(null);
function CurrencyProvider({ children }) {
  const [currency, setCurrency] = useState("LAK");
  const convert = useCallback((amount, from, to) => convertCurrency(amount, from, to || currency), [currency]);
  const format = useCallback((amount, code) => formatCurrency(amount, code || currency), [currency]);
  return (
    <CurrencyContext.Provider value={{ currency, setCurrency, convert, format, currencies: CURRENCIES }}>
      {children}
    </CurrencyContext.Provider>
  );
}
const useCurrency = () => useContext(CurrencyContext);

/* ============================= Finance formulas ============================= */
function round2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }

function calculateFixedDeposit({ principal, annualRatePct, termMonths }) {
  const P = Number(principal) || 0, r = Number(annualRatePct) || 0, t = Number(termMonths) || 0;
  const interestEarned = P * (r / 100) * (t / 12);
  return { interestEarned: round2(interestEarned), maturityValue: round2(P + interestEarned) };
}

function calculateCompoundInterest({ principal, monthlyDeposit, annualRatePct, years, compoundingPerYear }) {
  const P = Number(principal) || 0, PMT = Number(monthlyDeposit) || 0, r = (Number(annualRatePct) || 0) / 100;
  const t = Number(years) || 0, n = Number(compoundingPerYear) || 12;
  const periods = n * t, ratePerPeriod = r / n, depositsPerPeriod = PMT * (12 / n);
  const growthFactor = ratePerPeriod === 0 ? 1 : Math.pow(1 + ratePerPeriod, periods);
  const futureValueLumpSum = P * growthFactor;
  const futureValueDeposits = ratePerPeriod === 0 ? depositsPerPeriod * periods : depositsPerPeriod * ((growthFactor - 1) / ratePerPeriod);
  const futureValue = futureValueLumpSum + futureValueDeposits;
  const totalContributed = P + depositsPerPeriod * periods;
  return { futureValue: round2(futureValue), totalContributed: round2(totalContributed), totalInterest: round2(futureValue - totalContributed) };
}

function calculateNetProfitMargin({ grossRevenue, netProfit }) {
  const revenue = Number(grossRevenue) || 0, profit = Number(netProfit) || 0;
  if (revenue === 0) return { marginPct: 0 };
  return { marginPct: round2((profit / revenue) * 100) };
}

function calculateNPV({ initialInvestment, discountRatePct, cashFlows }) {
  const investment = Number(initialInvestment) || 0, r = (Number(discountRatePct) || 0) / 100;
  const discountedFlows = (cashFlows || []).map((cf, idx) => {
    const t = idx + 1, flow = Number(cf) || 0, presentValue = flow / Math.pow(1 + r, t);
    return { year: t, cashFlow: flow, presentValue: round2(presentValue) };
  });
  const totalPresentValue = discountedFlows.reduce((s, row) => s + row.presentValue, 0);
  const npv = totalPresentValue - investment;
  return { npv: round2(npv), isPositive: npv >= 0, discountedFlows };
}

function compoundFV(investment, ratePct, years) {
  return (Number(investment) || 0) * Math.pow(1 + (Number(ratePct) || 0) / 100, Number(years) || 0);
}
function calculateOpportunityCost({ chosen, foregone }) {
  const chosenFV = compoundFV(chosen.investment, chosen.expectedReturnPct, chosen.years);
  const foregoneFV = compoundFV(foregone.investment, foregone.expectedReturnPct, foregone.years);
  const chosenReturn = chosenFV - (Number(chosen.investment) || 0);
  const foregoneReturn = foregoneFV - (Number(foregone.investment) || 0);
  const opportunityCost = foregoneReturn - chosenReturn;
  const netAdvantage = -opportunityCost;
  return {
    chosen: { futureValue: round2(chosenFV), absoluteReturn: round2(chosenReturn) },
    foregone: { futureValue: round2(foregoneFV), absoluteReturn: round2(foregoneReturn) },
    opportunityCost: round2(opportunityCost), netAdvantage: round2(netAdvantage), chosenIsBetter: netAdvantage >= 0,
  };
}

/* ============================= Date helpers ============================= */
function monthKey(date) { const d = date ? new Date(date) : new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`; }
function monthLabel(key) { const [y, m] = key.split("-").map(Number); return new Date(y, m - 1, 1).toLocaleDateString(undefined, { month: "long", year: "numeric" }); }
function addMonthsToKey(key, n) { const [y, m] = key.split("-").map(Number); return monthKey(new Date(y, m - 1 + n, 1)); }

/* ============================= Export helpers ============================= */
function exportToCsv(rows, filename) {
  const ws = XLSX.utils.json_to_sheet(rows);
  const csv = XLSX.utils.sheet_to_csv(ws);
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  downloadBlob(blob, filename);
}
function exportToExcel(rows, filename, sheetName) {
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName || "Sheet1");
  XLSX.writeFile(wb, filename);
}
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

/* ============================= Ledger ============================= */
const CATEGORY_KEYS = ["salary", "business", "food", "transport", "utilities", "rent", "health", "education", "savings", "other"];

function useLedger() {
  const { convert, currency: primaryCurrency } = useCurrency();
  const initialKey = monthKey();
  const [cycles, setCycles] = useState({ [initialKey]: { openingBalance: 800000, closed: false } });
  const [transactions, setTransactions] = useState([
    { id: "seed1", cycleKey: initialKey, date: new Date().toISOString().slice(0, 10), type: "income", category: "salary", description: "Monthly salary", amount: 4500000, currency: "LAK" },
    { id: "seed2", cycleKey: initialKey, date: new Date().toISOString().slice(0, 10), type: "expense", category: "food", description: "Groceries", amount: 350000, currency: "LAK" },
  ]);
  const [rolloverNotice, setRolloverNotice] = useState(null);
  const [currentKey, setCurrentKey] = useState(initialKey);

  const netForCycle = useCallback((cycleKey) => {
    return transactions.filter((tx) => tx.cycleKey === cycleKey).reduce((sum, tx) => {
      const amt = convert(Number(tx.amount) || 0, tx.currency, primaryCurrency);
      return sum + (tx.type === "income" ? amt : -amt);
    }, 0);
  }, [transactions, convert, primaryCurrency]);

  const simulateNextMonth = useCallback(() => {
    const net = netForCycle(currentKey);
    const closingBalance = round2((cycles[currentKey].openingBalance || 0) + net);
    const nextKey = addMonthsToKey(currentKey, 1);
    setCycles((prev) => ({ ...prev, [currentKey]: { ...prev[currentKey], closed: true, closingBalance }, [nextKey]: { openingBalance: closingBalance, closed: false } }));
    setRolloverNotice({ amount: closingBalance, fromKey: currentKey });
    setCurrentKey(nextKey);
  }, [cycles, currentKey, netForCycle]);

  const currentCycle = cycles[currentKey] || { openingBalance: 0, closed: false };
  const currentTransactions = useMemo(() => transactions.filter((tx) => tx.cycleKey === currentKey).sort((a, b) => new Date(b.date) - new Date(a.date)), [transactions, currentKey]);
  const currentBalance = round2((currentCycle.openingBalance || 0) + netForCycle(currentKey));

  const addTransaction = useCallback((tx) => {
    setTransactions((prev) => [...prev, { id: `tx-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, cycleKey: currentKey, ...tx }]);
  }, [currentKey]);

  const deleteTransaction = useCallback((id) => setTransactions((prev) => prev.filter((t) => t.id !== id)), []);

  return { currentCycleKey: currentKey, currentCycle, currentTransactions, currentBalance, addTransaction, deleteTransaction, rolloverNotice, clearRolloverNotice: () => setRolloverNotice(null), simulateNextMonth };
}

function TransactionForm({ onAdd }) {
  const { t } = useLanguage();
  const { currencies, currency: defaultCurrency } = useCurrency();
  const [form, setForm] = useState({ date: new Date().toISOString().slice(0, 10), type: "expense", category: "food", description: "", amount: "", currency: defaultCurrency });
  const update = (field) => (e) => setForm((f) => ({ ...f, [field]: e.target.value }));
  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.amount || Number(form.amount) <= 0) return;
    onAdd({ ...form, amount: Number(form.amount) });
    setForm((f) => ({ ...f, description: "", amount: "" }));
  };
  return (
    <form onSubmit={handleSubmit} className="grid grid-cols-2 md:grid-cols-6 gap-3 items-end">
      <div className="col-span-1"><label className="label">{t("dashboard.date")}</label><input type="date" className="input" value={form.date} onChange={update("date")} /></div>
      <div className="col-span-1"><label className="label">{t("dashboard.type")}</label>
        <select className="input" value={form.type} onChange={update("type")}>
          <option value="income">{t("dashboard.income")}</option><option value="expense">{t("dashboard.expense")}</option>
        </select></div>
      <div className="col-span-1"><label className="label">{t("dashboard.category")}</label>
        <select className="input" value={form.category} onChange={update("category")}>
          {CATEGORY_KEYS.map((c) => <option key={c} value={c}>{t(`dashboard.categories.${c}`)}</option>)}
        </select></div>
      <div className="col-span-2 md:col-span-1"><label className="label">{t("dashboard.description")}</label><input type="text" className="input" value={form.description} onChange={update("description")} /></div>
      <div className="col-span-1"><label className="label">{t("dashboard.amount")}</label><input type="number" min="0" step="0.01" className="input" value={form.amount} onChange={update("amount")} /></div>
      <div className="col-span-1"><select className="input" value={form.currency} onChange={update("currency")}>
        {Object.values(currencies).map((c) => <option key={c.code} value={c.code}>{c.symbol} {c.code}</option>)}
      </select></div>
      <div className="col-span-2 md:col-span-6"><button type="submit" className="btn-primary w-full md:w-auto">{t("dashboard.addTransaction")}</button></div>
    </form>
  );
}

        <ResultTile label={t("dashboard.currentBalance")} value={format(currentBalance)} tone="indigo" />
        <ResultTile label={t("dashboard.openingBalance")} value={format(currentCycle.openingBalance || 0)} tone="gold" />
        <ResultTile label={t("dashboard.income")} value={format(income)} tone="bamboo" />
        <ResultTile label={t("dashboard.expense")} value={format(expense)} tone="lotus" />
      </div>
      <Card><TransactionForm onAdd={addTransaction} /></Card>
      <Card>
        <div className="flex items-center justify-between mb-2">
          <h3 className="font-display font-semibold text-ink">{t("dashboard.title")}</h3>
          <div className="flex gap-2">
            <button className="btn-secondary text-sm px-3 py-1.5" onClick={() => exportToCsv(currentTransactions.map((tx) => ({ Date: tx.date, Type: tx.type, Category: tx.category, Description: tx.description, Amount: tx.amount, Currency: tx.currency })), "laokip-ledger.csv")}>{t("dashboard.exportCsv")}</button>
            <button className="btn-secondary text-sm px-3 py-1.5" onClick={() => exportToExcel(currentTransactions.map((tx) => ({ Date: tx.date, Type: tx.type, Category: tx.category, Description: tx.description, Amount: tx.amount, Currency: tx.currency })), "laokip-ledger.xlsx", "Ledger")}>{t("dashboard.exportExcel")}</button>
          </div>
        </div>
        <div className="stitch-divider mb-2" />
        <TransactionList transactions={currentTransactions} onDelete={deleteTransaction} />
      </Card>
    </div>
  );
}

  const { format, currency } = useCurrency();
  const [chosen, setChosen] = useState({ name: "Fixed Deposit", investment: 10000000, expectedReturnPct: 5, years: 5 });
  const [foregone, setForegone] = useState({ name: "Stock Index Fund", investment: 10000000, expectedReturnPct: 9, years: 5 });
  const result = useMemo(() => calculateOpportunityCost({ chosen, foregone }), [chosen, foregone]);

  function OptionForm({ label, option, onChange }) {
    const update = (field) => (e) => onChange({ ...option, [field]: field === "name" ? e.target.value : Number(e.target.value) });
    return (
      <div className="space-y-3">
        <h3 className="font-display font-semibold text-ink">{label}</h3>
        <div><label className="label">{t("calculators.opportunityCost.optionName")}</label><input type="text" className="input" value={option.name} onChange={update("name")} /></div>
        <div><label className="label">{t("calculators.opportunityCost.investment")}</label><input type="number" className="input" value={option.investment} onChange={update("investment")} /></div>
        <div><label className="label">{t("calculators.opportunityCost.expectedReturn")}</label><input type="number" step="0.01" className="input" value={option.expectedReturnPct} onChange={update("expectedReturnPct")} /></div>
        <div><label className="label">{t("calculators.opportunityCost.years")}</label><input type="number" className="input" value={option.years} onChange={update("years")} /></div>
      </div>
    );
  }

  return (
    <Card title={t("calculators.opportunityCost.title")} subtitle={t("calculators.opportunityCost.subtitle")}>
      <div className="grid md:grid-cols-2 gap-6 mb-5">
        <OptionForm label={t("calculators.opportunityCost.chosenLabel")} option={chosen} onChange={setChosen} />
        <OptionForm label={t("calculators.opportunityCost.foregoneLabel")} option={foregone} onChange={setForegone} />
      </div>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
        <ResultTile label={`${chosen.name} — ${t("calculators.opportunityCost.absoluteReturn")}`} value={format(result.chosen.absoluteReturn, currency)} tone="indigo" />
        <ResultTile label={`${foregone.name} — ${t("calculators.opportunityCost.absoluteReturn")}`} value={format(result.foregone.absoluteReturn, currency)} tone="gold" />
        <ResultTile label={t("calculators.opportunityCost.netAdvantage")} value={format(result.netAdvantage, currency)} tone={result.chosenIsBetter ? "bamboo" : "lotus"} />
      </div>
      <p className={`text-sm ${result.chosenIsBetter ? "text-bamboo" : "text-lotus"}`}>
        {result.chosenIsBetter ? t("calculators.opportunityCost.verdictChosenBetter", { amount: format(Math.abs(result.netAdvantage), currency) }) : t("calculators.opportunityCost.verdictForegoneBetter", { amount: format(Math.abs(result.netAdvantage), currency) })}
      </p>
    </Card>
  );
}

/* ============================= Settings ============================= */
function AccountSettings() {
  const { user } = useAuth();
  const { t, language, setLanguage, supportedLanguages } = useLanguage();
  const { currency, setCurrency, currencies } = useCurrency();
  const [saved, setSaved] = useState(false);
  const handleSave = () => { setSaved(true); setTimeout(() => setSaved(false), 2000); };
  return (
    <Card title={t("settings.title")}>
      <div className="space-y-6 max-w-md">
        <div>
          <h3 className="font-display font-semibold text-ink mb-3">{t("settings.profile")}</h3>
          <div className="flex items-center gap-3 mb-4">
            <div className="h-12 w-12 rounded-full bg-indigo-100 flex items-center justify-center font-display font-bold text-indigo-700">{(user?.name || "U")[0]}</div>
            <div><p className="font-medium text-ink">{user?.name}</p><p className="text-sm text-ink/50">{user?.email}</p></div>
          </div>
        </div>
        <div className="stitch-divider" />
        <div><label className="label">{t("settings.primaryCurrency")}</label>
          <select className="input" value={currency} onChange={(e) => setCurrency(e.target.value)}>
            {Object.values(currencies).map((c) => <option key={c.code} value={c.code}>{c.symbol} {c.code}</option>)}
          </select></div>
        <div><label className="label">{t("settings.language")}</label>
          <select className="input" value={language} onChange={(e) => setLanguage(e.target.value)}>
            {supportedLanguages.map((l) => <option key={l.code} value={l.code}>{l.label}</option>)}
          </select></div>
        <button className="btn-primary" onClick={handleSave}>{t("settings.save")}</button>
        {saved && <p className="text-bamboo text-sm">{t("settings.saved")}</p>}
      </div>
    </Card>
  );
}

/* ============================= App ============================= */
const PAGES = { dashboard: Dashboard, fixedDeposit: FixedDepositCalculator, compoundInterest: CompoundInterestCalculator, profitMargin: NetProfitMarginCalculator, npv: NPVCalculator, opportunityCost: OpportunityCostCalculator, settings: AccountSettings };

function App() {
  const { user, loading } = useAuth();
  const { t } = useLanguage();
  const [page, setPage] = useState("dashboard");
  if (loading) return <div className="min-h-screen flex items-center justify-center bg-paper"><p className="text-ink/50">{t("common.loading")}</p></div>;
  if (!user) return <GoogleSignIn />;
  const Page = PAGES[page] || Dashboard;
  return (
    <div className="min-h-screen bg-paper">
      <Navbar active={page} onNavigate={setPage} />
      <main className="max-w-5xl mx-auto px-4 py-6"><Page /></main>
    </div>
  );
}

function Root() {
  return (
    <LanguageProvider>
      <CurrencyProvider>
        <AuthProvider>
          <App />
        </AuthProvider>
      </CurrencyProvider>
    </LanguageProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
