name: Deploy Supabase Migrations

# Publishes everything in supabase/migrations/ (schema, RLS policies,
# Realtime publication) to your live Supabase project. Having the correct
# SQL sitting in the repo does nothing on its own — Postgres only enforces
# whatever was actually applied via `supabase db push`. Without this
# workflow you'd have to run that by hand after every schema change.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-supabase.yml"
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
